services:
  postgres:
    image: postgres:15-alpine
    container_name: otee-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: otee_admin
      POSTGRES_PASSWORD: otee_password
      POSTGRES_DB: task_scheduler
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otee_admin -d task_scheduler"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: otee-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: otee-scheduler-api
    ports:
      - "8001:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://otee_admin:otee_password@postgres:5432/task_scheduler
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-alpha:
    build: .
    container_name: otee-worker-alpha
    command: python -m scheduler.worker --api-url http://api:8000 --redis-url redis://redis:6379/0
    environment:
      PYTHONUNBUFFERED: "1"
      WORKER_ID: worker-alpha
      DATABASE_URL: postgresql://otee_admin:otee_password@postgres:5432/task_scheduler
      SCHEDULER_API_URL: http://api:8000
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started

  worker-beta:
    build: .
    container_name: otee-worker-beta
    command: python -m scheduler.worker --api-url http://api:8000 --redis-url redis://redis:6379/0
    environment:
      PYTHONUNBUFFERED: "1"
      WORKER_ID: worker-beta
      DATABASE_URL: postgresql://otee_admin:otee_password@postgres:5432/task_scheduler
      SCHEDULER_API_URL: http://api:8000
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started

  worker-gamma:
    build: .
    container_name: otee-worker-gamma
    command: python -m scheduler.worker --api-url http://api:8000 --redis-url redis://redis:6379/0
    environment:
      PYTHONUNBUFFERED: "1"
      WORKER_ID: worker-gamma
      DATABASE_URL: postgresql://otee_admin:otee_password@postgres:5432/task_scheduler
      SCHEDULER_API_URL: http://api:8000
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started

  sweeper:
    build: .
    container_name: otee-scheduler-sweeper
    command: python -m scheduler.sweeper
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://otee_admin:otee_password@postgres:5432/task_scheduler
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: otee-scheduler-test
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: sqlite:///./unit_test.db
    command: pytest -q tests/test_scheduler.py

volumes:
  postgres_data:
  redis_data:
