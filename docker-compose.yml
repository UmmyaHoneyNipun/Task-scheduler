services:
  postgres:
    image: postgres:15-alpine
    container_name: otee-postgres
    environment:
      POSTGRES_USER: otee_admin
      POSTGRES_PASSWORD: otee_password
      POSTGRES_DB: task_scheduler
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otee_admin -d task_scheduler"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: otee-scheduler-api
    ports:
      - "8001:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://otee_admin:otee_password@postgres:5432/task_scheduler
    depends_on:
      postgres:
        condition: service_healthy

  worker-alpha:
    build: .
    container_name: otee-worker-alpha
    command: python -m scheduler.worker --api-url http://api:8000
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://otee_admin:otee_password@postgres:5432/task_scheduler
    depends_on:
      api:
        condition: service_started

  worker-beta:
    build: .
    container_name: otee-worker-beta
    command: python -m scheduler.worker --api-url http://api:8000
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://otee_admin:otee_password@postgres:5432/task_scheduler
    depends_on:
      api:
        condition: service_started

  sweeper:
    build: .
    container_name: otee-scheduler-sweeper
    command: python -m scheduler.sweeper
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://otee_admin:otee_password@postgres:5432/task_scheduler
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
